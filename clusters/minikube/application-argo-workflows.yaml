apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-workflows
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argo-workflows
    targetRevision: 1.0.4
    helm:
      releaseName: argo
      values: |
        fullnameOverride: argo
        singleNamespace: true
        workflow:
          serviceAccount:
            create: true
            name: argo-workflow
          rbac:
            create: true
        controller:
          workflowDefaults:
            spec:
              serviceAccountName: argo-workflow
        server:
          extraArgs:
          - --auth-mode=server
          serviceType: NodePort
          serviceNodePort: 32746
        useStaticCredentials: true
        artifactRepository:
          archiveLogs: false
          s3:
            bucket: my-bucket
            endpoint: minio:9000
            insecure: true
            accessKeySecret:
              name: my-minio-cred
              key: accesskey
            secretKeySecret:
              name: my-minio-cred
              key: secretkey
  destination:
    server: https://kubernetes.default.svc
    namespace: argo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
