name: Validate GitOps

on:
  push:
  pull_request:

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up kubectl
      uses: azure/setup-kubectl@v4
      with:
        version: v1.35.0

    - name: Render cluster roots
      run: |
        kubectl kustomize clusters/minikube >/tmp/clusters-minikube.yaml
        kubectl kustomize clusters/eks-dev >/tmp/clusters-eks-dev.yaml
        kubectl kustomize clusters/eks-prod >/tmp/clusters-eks-prod.yaml

    - name: Render operator overlays
      run: |
        kubectl kustomize apps/hybrid-workflows-operator/overlays/minikube >/tmp/hybrid-workflows-operator-minikube.yaml
        kubectl kustomize apps/hybrid-workflows-operator/overlays/eks-dev >/tmp/hybrid-workflows-operator-eks-dev.yaml
        kubectl kustomize apps/hybrid-workflows-operator/overlays/eks-prod >/tmp/hybrid-workflows-operator-eks-prod.yaml

    - name: Render Argo Workflows addon overlays
      run: |
        kubectl kustomize platform/argo-workflows/overlays/minikube >/tmp/argo-workflows-addons-minikube.yaml
        kubectl kustomize platform/argo-workflows/overlays/eks-dev >/tmp/argo-workflows-addons-eks-dev.yaml
        kubectl kustomize platform/argo-workflows/overlays/eks-prod >/tmp/argo-workflows-addons-eks-prod.yaml

    - name: Verify expected operator resources are present
      run: |
        for rendered in /tmp/hybrid-workflows-operator-*.yaml; do
          grep -q 'kind: CustomResourceDefinition' "$rendered"
          grep -q 'name: hybridworkflows.hybridwf.io' "$rendered"
          grep -q 'kind: Deployment' "$rendered"
          grep -q 'name: hybrid-workflows-operator-controller-manager' "$rendered"
        done
