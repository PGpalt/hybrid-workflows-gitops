apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: minikube-root
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/PGpalt/hybrid-workflows-gitops.git
    targetRevision: main
    path: clusters/minikube
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
