apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
patches:
- path: image-patch.yaml
  target:
    kind: Deployment
    name: hybrid-workflows-operator-controller-manager
    namespace: hybrid-workflows-operator-system
- path: namespace.yaml
  target:
    kind: Namespace
    name: hybrid-workflows-operator-system
