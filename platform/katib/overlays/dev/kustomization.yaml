apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
patches:
- path: katib-config-configmap.yaml
  target:
    kind: ConfigMap
    name: katib-config
    namespace: kubeflow
- path: katib-ui-nodeport.yaml
  target:
    kind: Service
    name: katib-ui
    namespace: kubeflow
